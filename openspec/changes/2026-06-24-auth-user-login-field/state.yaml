closed_signoffs:
  - id: D1-rpkg009
    decision: Campo string only (no int, json, composite)
    rationale: Otros tipos requieren diferente pipeline hashing/validation. Out of scope v1.5.0.
    applies_to: design.md D1, MakeAuthUserCommand validation
  - id: D2-rpkg009
    decision: Default `email` (BC con v1.4.0)
    rationale: Consumers sin flag generan idéntico a v1.4.0.
    applies_to: design.md D2, MakeAuthUserCommand default value
  - id: D3-rpkg009
    decision: Columna DB = nombre del campo
    rationale: Queries directos sin indirección via config.
    applies_to: design.md D3, auth-user.migration.stub
  - id: D4-rpkg009
    decision: Validación mínima (required + string)
    rationale: Agnóstico al dominio. Consumer customiza via override.
    applies_to: design.md D4, auth-user.auth-controller.stub
  - id: D5-rpkg009
    decision: AuthUser base BC, subclase override
    rationale: AuthUser mantiene `email` + `MustVerifyEmail`. Subclases con `--login-field != email` NO implementan `MustVerifyEmail` (intended).
    applies_to: design.md D5, AuthUser base + auth-user.model.stub
  - id: D6-rpkg009
    decision: `scopeWhereLoginField()` API
    rationale: Helper recomendado; subclases pueden usar `where($this->loginField, $value)` directo.
    applies_to: design.md D6, AuthUser base

findings:
  closing:
    - id: R-PKG-009
      title: mk:make:auth-user hardcodea `email` como campo de login. Debe ser configurable.
    - id: GAP-001
      title: auth-user.model.stub NO genera $fillable propio
      rationale: "El stub actual solo genera $table, constructor, y hereda de AuthUser. Para soportar --login-field=ci, el stub debe generar $fillable específico + $loginField + $casts sin email_verified_at. Cambio non-trivial que proposal.md no detalla."
      discovered_at: "2026-06-25 (sesión R-PKG-009)"
      action: "T1.2 incluye generación de $fillable, $loginField, $casts, y override de MustVerifyEmail"

  explicitly_out_of_scope:
    - id: OOS-RPKG009-001
      title: "Múltiples campos de login (email O ci)"
      reason: "Q1 recomendación A. Se puede agregar en v1.6.0 si RETO lo pide."
    - id: OOS-RPKG009-002
      title: "Validación de formato específica (regex CI, formato email)"
      reason: "Consumer customiza via LoginRequest override. D4."

