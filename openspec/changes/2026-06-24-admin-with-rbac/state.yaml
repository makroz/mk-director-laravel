findings:
  closing:
    - id: R-PKG-008
      title: mk:module necesita flag --with-rbac para generar Admin + Role + Ability + pivot tables

  reusable_cross_project:
    - "PHP/PCRE2 quirk: `\{` para escape literal de `{` en regex YA NO FUNCIONA en PHP 8.5+ (PCRE2). Usar `{` directamente sin escape. Impacto: tests que asumen PCRE clásico. Affects: cualquier package con Pest/source-parsing tests."
    - "PHP 8.5 deprecó `ReflectionMethod::setAccessible(true)` — ya no es necesario en PHP 8.1+. Quitar las llamadas."
    - "Pattern: scaffolder testing = extraer `app_path()` a un `modulesPath()` method overridable. Tests subclasean y override a tempdir. 4-line refactor, mejora testabilidad 10x."
    - "Pattern: Pest end-to-end para command que toca filesystem requiere `OutputStyle` (Laravel wrapper) no `NullOutput` (Symfony). Test setup: `$command->setOutput(new OutputStyle(new StringInput(''), new NullOutput()))`."
    - "Carbon `addSeconds($i)` formato `Y_m_d_His` produce 17 chars (no 15). Substr correctos en tests: 17 para segundos únicos."

