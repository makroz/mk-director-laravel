findings:
  closing:
    - id: R-PKG-008
      title: mk:module necesita flag --with-rbac para generar Admin + Role + Ability + pivot tables

design_questions:
  - Q1: ¿El flag --with-rbac genera los 3 modelos + controllers + migrations, o hookea un módulo existente?
    options:
      - A: Generar todo de cero con `mk:module Admin --with-rbac`
      - B: Hook sobre módulo existente: `mk:module Admin --add-rbac`
    recommendation: A (más limpio, no requiere módulo pre-existente).
  - Q2: ¿Los profile fields custom (62 LOC de migration) son parte de --with-rbac o un flag separado?
    recommendation: Flag separado `--profile-fields=name,phone,avatar` o config posterior. R-PKG-009 cubre auth-user, R-PKG-008 cubre RBAC.
  - Q3: ¿El AuthController de admin se genera como parte de --with-rbac?
    recommendation: NO. --with-rbac asume que el usuario autenticado YA tiene un scope. AuthController es de mk:make:auth-user (separado).

risk_register:
  - R-RISK-PKG-008-001: "Conflicto entre flag --with-rbac y --profile-fields (overlapping)"
    mitigation: "Flags ortogonales. --with-rbac genera RBAC, --profile-fields agrega campos al model. Combinables."

next_action:
