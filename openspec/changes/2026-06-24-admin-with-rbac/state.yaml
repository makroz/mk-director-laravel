    rationale: "matches RETO orphan branch pattern + R-MK-001 isolation + proposal.md explicit"
    documented_in: design.md § "Decision: D1"
  - id: D2
    decision: "User model extends Illuminate\Foundation\Auth\User, NOT Mk\\Director\\Auth\\Models\\AuthUser"
    rationale: "proposal.md line 102-103 explicit; auth scope is separate concern (mk:make:auth-user)"
    documented_in: design.md § "Decision: D2"
  - id: D3
    decision: "Pivot naming: {scope}_role_user and {scope}_ability_role (scope-prefixed)"
    rationale: "avoids R3-014 precedent (FK retrofitted on shared role_user table)"
    documented_in: design.md § "Decision: D3"
  - id: D4
    decision: "Stubs location: src/Stubs/module-rbac/ (NOT src/Console/Stubs/ as tasks.md T0.2 says)"
    rationale: "verified: existing stub root is src/Stubs/ (controller.stub, model.stub, etc.)"
    documented_in: design.md § "Decision: D4"
    follow_up: "tasks.md T0.2 text needs correction in next sprint iteration"
  - id: D5
    decision: "Policy auto-binding via Gate::policy() + Gate::define() per ability"
    rationale: "explicit abilities make R-PKG-007 discover trivial + standard Pest patterns work"
    documented_in: design.md § "Decision: D5"
  - id: D6
    decision: "Default-deny + super-admin before() bypass (RBAC-004 spec compliant)"
    rationale: "spec is explicit; matches Laravel convention; security-positive"
    documented_in: design.md § "Decision: D6"

