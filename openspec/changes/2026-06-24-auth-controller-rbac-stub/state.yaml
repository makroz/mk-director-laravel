design_questions:
  - Q1: ¿RBAC integration se aplica automáticamente a TODOS los endpoints auth o solo a /me y /logout?
    recommendation: /me y /logout (los privados). /login, /refresh, /forgot, /reset son públicos.
    resolution: Implementado en T1.1 + T1.2. authorizeAbility() helper se llama al ppio de me() y logout().
  - Q2: ¿Ability checks se hardcodean o se configuran?
    recommendation: Configurables via `mk_director.auth.abilities.{endpoint}` array.
    resolution: Implementado. config/mk_director.php tiene `abilities => [me => env(...), logout => env(...)]` con default null (BC).
  - Q3: ¿Audit log de login attempts?
    recommendation: SÍ. Si MkAuditLoggerPlugin está activo, cada login (success/fail) se loggea automáticamente.
    resolution: Implementado via AuthEvent class. 6 tipos: login.success/failed, logout, refresh.success (TODO), password_reset.requested/success (TODO). Consumer-side listener puede persistir a DB/Log/CloudWatch/etc.
  - Q4: ¿Rate limiting?
    recommendation: Aplicar `throttle:5,1` a /login por default, configurable.
    resolution: Implementado. Routes stub tiene `{{rbac{Login,Forgot,Reset}Throttle}}` placeholders inline. Default 5,1 / 3,1 / 3,1, configurable via env.

risk_register:
  - id: R-RISK-PKG-010-001
    description: "Performance: ability checks en cada request a /me"
    mitigation: "Cachear abilities del user en memoria durante el request (RbacService::userAbilities() con cache TTL)."
    status: mitigated (AbilityResolver ya implementa cache por user + Sanctum short-circuit en R-PKG-007)
  - id: R-RISK-PKG-010-002
    description: "BC con v1.5.0-rc3: consumidores que asumen AuthController sin ability checks"
    mitigation: "Default behavior es SIN ability checks (backward compatible). Habilitar via flag `--with-auth-rbac` en mk:make:auth-user."
    status: mitigated (verificado por smoke test mental + tests existentes pasan idénticos)
  - id: R-RISK-PKG-010-003
    description: "Loggear passwords en audit events por error"
    mitigation: "Test estático `buildRbacReplacements never logs passwords in audit events` verifica que el código generado NO contiene 'password' como key del payload de AuthEvent. Sanitización del caller."
    status: mitigated (test verde)
  - id: R-RISK-PKG-010-004
    description: "Conflict con R-PKG-009 en auth-user.auth-controller.stub"
    mitigation: "Ambos usan conditional placeholders. --login-field popula {{loginField}} + 4 condicionales. --with-auth-rbac popula 11 condicionales RBAC. NO overlap."
    status: mitigated (336/336 tests verde, ortogonalidad verificada)

