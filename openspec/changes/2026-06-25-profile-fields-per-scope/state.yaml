source_feature:
  location: projects/reto/reto-api/app/Modules/Admin/
  current_implementation: "Admin tiene columnas custom `dni` + `phone` escritas a mano en migration + Admin.php (rama huérfana makromania/260624-0511--admin-module). Member necesitará `phone` + `birthdate` (futuro). Sin email verification en RETO todavía."
  required_change: "Profile fields declarativos via `--profile-fields=<csv>`. Email verification opt-in via `--verify-email`."

triage_checklist:
  R-G-033-A-1_≥_2_dominios:
    answer: SÍ
    rationale: "Cualquier app multi-vertical necesita profile fields per-scope. E-commerce (customer), fintech (KYC), social (bio+avatar), healthcare (medical history), etc."
  R-G-033-A-2_testeable_sin_RETO:
    answer: SÍ
    rationale: "Source-parsing tests del command + stubs. No requiere boot de Laravel ni RETO."
  R-G-033-A-3_doc_sin_RETO:
    answer: SÍ
    rationale: "Doc como 'Profile fields per-scope' genérico. RETO solo se menciona en 'Dogfooding source' de proposal (interno)."
  decision: GO

in_flight: []

design_questions:
  - id: D1
    question: "¿Profile fields por scope o compartidos (User global)?"
    recommendation: "Por scope. MME/R-MK-001 estricto."
    resolution: "Implementado. Cada scope genera su propia tabla (admins, members) + modelo. Encapsulación pineada con tests."
  - id: D2
    question: "¿Default sin profile fields (BC con v1.5.0-rc4)?"
    recommendation: "Sí. Default = idéntico a v1.5.0-rc4."
    resolution: "Implementado. handle() retorna replacements con string vacío si --profile-fields ausente. BC verificada con tests source-parsing."
  - id: D3
    question: "¿Tipos de profile fields en v1.5.0-rc5?"
    recommendation: "Todos string. Custom types en v1.6.0."
    resolution: "Implementado. Migration genera columnas string nullable. Sin cast en model (Laravel auto-castea). Documentado en CHANGELOG § Tipos + DEVELOPER_GUIDE § 3.9."
  - id: D4
    question: "¿Qué endpoints exponen profile fields?"
    recommendation: "GET /me (read), PATCH /me (update), POST /register (write al crear)."
    resolution: "Implementado. register() condicional (si --profile-fields OR --verify-email), updateProfile() condicional (solo si --profile-fields)."
  - id: D5
    question: "¿--verify-email default?"
    recommendation: "Default false (BC)."
    resolution: "Implementado. Flag opt-in. email_verified_at column/cast/import solo aparecen si --verify-email (refactor de R-PKG-009)."
  - id: D6
    question: "¿Notificación de verificación?"
    recommendation: "Laravel default Illuminate\\Auth\\Notifications\\VerifyEmail. Queueable."
    resolution: "Implementado. register() llama $user->sendEmailVerificationNotification() si --verify-email activo. Consumer puede override la notification publicando CustomVerifyEmail."
  - id: D7
    question: "¿Validación de field names?"
    recommendation: "PHP identifier válido."
    resolution: "Implementado. resolveProfileFields() valida con /^[a-zA-Z_][a-zA-Z0-9_]*$/."
  - id: D8
    question: "¿Duplicados en CSV?"
    recommendation: "Reject fail-fast."
    resolution: "Implementado. resolveProfileFields() detecta duplicados via array_unique + diff_assoc. Mensaje explícito 'Campo X duplicado en --profile-fields.'"
  - id: D9
    question: "¿Ortogonalidad con --with-auth-rbac y --login-field?"
    recommendation: "Total. 4 flags independientes."
    resolution: "Implementado. --verify-email solo aplica si --login-field=email (warning si no). 4 flags combinables en 16 subsets (excepto verify-email con non-email login)."
  - id: D10
    question: "¿/me PATCH rate-limited?"
    recommendation: "No por default. Consumer puede agregar."
    resolution: "Implementado. PATCH /me sin rate limit middleware. Documentado en DEVELOPER_GUIDE § 3.9."

closed_signoffs:
  - id: ADR-001-D1
    decision: "Profile fields per scope, NO compartidos."
    rationale: "MME/R-MK-001 estricto. Cada bounded context vive en su propio folder con su propia tabla."
    applies_to: "ADR-001 en design.md, buildProfileFieldsReplacements(), auth-user.migration.stub (tableName por scope), auth-user.model.stub ($table propio por scope)."
  - id: ADR-002-D5
    decision: "email_verified_at ahora depende de --verify-email (no de login-field=email)."
    rationale: "R-PKG-009 los activaba siempre que loginField=email; refactor para opt-in via flag."
    applies_to: "ADR-002 en design.md, loginFieldReplacements array en MakeAuthUserCommand::handle()."
  - id: ADR-003-D9
    decision: "--verify-email se ignora con warning si --login-field != email."
    rationale: "Verificar un campo que no es email no tiene sentido. Simplificación matriz combinaciones."
    applies_to: "ADR-003 en design.md, handle() warning block."

risk_register:
  - id: R-RISK-PKG-011-001
    description: "Columnas duplicadas con name o loginField"
    mitigation: "Validación fail-fast en resolveProfileFields() (D8)"
    status: mitigated (372 tests verde, 36 nuevos pinean validaciones)
  - id: R-RISK-PKG-011-002
    description: "BC break: app existente asume columnas mínimas"
    mitigation: "Default mode = columnas idénticas a v1.5.0-rc4 (D2)"
    status: mitigated (MakeAuthUserProfileFieldsTest § BC verification)
  - id: R-RISK-PKG-011-003
    description: "Profile fields leak entre scopes"
    mitigation: "Cada scope genera su propia tabla + modelo. Tests de encapsulación pineados (AuthUserProfileFieldsTest)."
    status: mitigated (9 tests pinean encapsulación Admin vs Member)
  - id: R-RISK-PKG-011-004
    description: "Ortogonalidad rota con --with-auth-rbac"
    mitigation: "Source-parsing test que verifica combinaciones (MakeAuthUserProfileFieldsTest § Ortogonalidad)."
    status: mitigated
  - id: R-RISK-PKG-011-005
    description: "Email verification endpoint sin rate limit"
    mitigation: "/email/resend tiene throttle 6,1 (R-PKG-011 implícito). /email/verify es signed URL (Laravel built-in). Documentado en DEVELOPER_GUIDE § 3.10."
    status: mitigated

