audit_phase:
  e2e_sandbox: "tests/Unit/Console/MakeAuthUserAuditFixesTest.php (NEW, 5 tests, 17 assertions)"
  bugs_found_pre_existing:
    - id: AUDIT-001
      severity: critical
      sprint_origin: R-PKG-011
      description: "Signature parser interpretaba {id}/{hash} en description de --verify-email como argumentos del command. Resultado: php artisan mk:make:auth-user X --verify-email fallaba con 'Not enough arguments (missing: hash)'."
      fix_commit: e1fd107
      fix: "{id}/{hash} → <id>/<hash> en signature (sin braces)."
    - id: AUDIT-002
      severity: high
      sprint_origin: R-PKG-011
      description: "buildUpdateProfileMethod(string \$scope, string \$loginField, string \$rulesPhp) usaba \$scopeLower internamente sin recibirla. Resultado: php artisan mk:make:auth-user X --profile-fields=Y fallaba con 'Undefined variable \$scopeLower'."
      fix_commit: e1fd107
      fix: "Agregar \$scopeLower como segundo parametro + pasar desde handle()."
    - id: AUDIT-003
      severity: medium
      sprint_origin: R-PKG-011
      description: "'name' no estaba en reserved columns de resolveProfileFields(). El base scope genera \$table->string('name') y --profile-fields=name generaba OTRA \$table->string('name')->nullable() → duplicate column error en php artisan migrate."
      fix_commit: e1fd107
      fix: "Agregar 'name' a reserved list de resolveProfileFields()."
  regression_protection:
    - "MakeAuthUserAuditFixesTest.php pinea que no se regresen los 3 fixes."
    - "5 tests verde (signature clean, buildUpdateProfileMethod firma, handle() call site, 'name' reserved, reserved list completa)."
  lessons_learned:
    - "Source-parsing tests pinean strings en código, NO ejecutan el command. Bugs que solo se manifiestan en runtime se escapan."
    - "Audit pre-tag con sandbox Laravel real (php artisan mk:make:auth-user Member --flags) detecta bugs que los source-parsing tests no pueden."
    - "R-NEW-001 followup: cualquier sprint que modifica un command scaffolder DEBE correr e2e en sandbox antes de tag."
    - "Aplicabilidad cross-sprint: mismo pattern aplicó a R-PKG-011 (donde están los bugs originales). Misma lección."

