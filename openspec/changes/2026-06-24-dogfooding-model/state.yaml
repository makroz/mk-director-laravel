findings:
  closing:
    - id: R-PKG-007
      title: DiscoverAbilitiesCommand debe ser genérico del paquete (no de RETO)
      sub_change: 2026-06-24-discover-abilities-to-core
      rationale: 268 LOC escritas manualmente por RETO resuelven un problema genérico (auto-descubrir abilities desde controllers). Cualquier app RBAC lo necesita.
    - id: R-PKG-008
      title: mk:module Admin --with-rbac falta — RETO escribió 3 controllers (Admin+Role+Ability) interrelacionados
      sub_change: 2026-06-24-admin-with-rbac
      rationale: Cuando una app necesita RBAC completo, el scaffolder actual genera módulo por módulo. Faltaría flag que genere el trío + pivot tables + DiscoverAbilities auto-run.
    - id: R-PKG-009
      title: mk:make:auth-user asume email — RETO necesita `ci` (cédula de identidad, Bolivia)
      sub_change: 2026-06-24-auth-user-login-field
      rationale: El campo de login es hardcoded a `email` en el AuthUser base + stub del AuthController + LoginRequest. Otros proyectos pueden necesitar `phone`, `username`, `documento`, etc. Debe ser configurable.
    - id: R-PKG-010
      title: AuthController stub (1.4.0) no integra RBAC — RETO escribió 322 LOC de integración manual
      sub_change: 2026-06-24-auth-controller-rbac-stub
      rationale: El stub actual solo tiene login/refresh/logout/me/forgot/reset. Falta integración con abilities, role checks en endpoints, audit log de intentos fallidos.
    - id: R-RET-001
      title: RETO módulo Admin (branch makromania/260624-0511--admin-module) no mergeado, código pre-1.4.0, no usa skills nuevas
      sub_change: 2026-06-24-retrofit-reto-admin-module
      rationale: 5019 LOC escritas contra v1.2.6→v1.3.0 sin R-G-032 sync, sin skills indexed, sin R-MK-001 estricto. Releer y rehacer con base 1.4.0+ + sub-changes R-PKG-007/008/009/010 ya mergeados.

  explicitly_out_of_scope:
    - id: OOS-001
      title: "Liberar mk-director a público"
      reason: el modelo dogfooding-first implica que la liberación pública es un evento FUTURO, posterior a validar el paquete en RETO como app real. No hay fecha.
    - id: OOS-002
      title: "Migrar otros consumers de 1.4.0 a futuro modelo"
      reason: no hay otros consumers activos (RETO confirmado en 1.3.1, decisión consciente de no bumpear). El modelo se aplica desde 1.5.0 en adelante.
    - id: OOS-003
      title: "Reescribir 1.4.0 retroactivamente"
      reason: el cambio de modelo es prospectivo. 1.4.0 ya está publicado y consumido por 0 proyectos activos. Se valida desde el próximo sprint.
    - id: OOS-004
      title: "Cambiar convenciones de nomenclatura de branches"
      reason: `makromania/YYMMDD-HHMM--<task>` sigue siendo el estándar (R-G-006). Solo cambia el contenido de los commits.

risk_register:
  - id: R-RISK-001
    description: "Sobre-coupling del paquete a RETO"
    likelihood: medium
    impact: high
    mitigation: R-G-033-A (criterio genérico: ≥ 2 dominios bounded). Cada feature debe justificarse.
  - id: R-RISK-002
    description: "RETO queda stale si releases del paquete se atrasan"
    likelihood: low
    impact: medium
    mitigation: releases por demanda, no por calendario. Si RETO pide X y X está listo, se taggea.
  - id: R-RISK-003
    description: "BC rompe RETO entre releases"
    likelihood: high
    impact: medium
    mitigation: R-G-033-C + CHANGELOG con migración clara + notificación a RETO con ≥ 1 sprint de anticipación cuando sea posible.
  - id: R-RISK-004
    description: "Scope creep del paquete (absorbe features RETO-only)"
    likelihood: medium
    impact: medium
    mitigation: R-G-033-B (default = RETO si hay duda). Code review enforce este criterio.

tags:
  - v1.5.0-rc1 (cuando todos los sub-changes cierren, NO antes)

notes:
  - Este sprint es meta — no genera tag del paquete. Su cierre se mide por cierre de los 5 sub-changes.
  - R-G-033 es la regla de oro del modelo. Si en algún momento hay conflicto entre dogfooding y BC, dogfooding gana (mientras solo RETO consuma).
  - El continuation prompt debe actualizarse cada vez que se abre o cierra un sub-change.
