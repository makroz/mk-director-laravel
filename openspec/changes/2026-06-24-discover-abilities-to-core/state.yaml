design_signoff:
  date: 2026-06-25
  by: Mario
  q1_source_of_truth:
    decision: HYBRID
    meaning: provider primario; attribute+docblock como fallback ÚNICO cuando provider ausente
    rationale: una sola fuente por módulo, sin drift
  q2_attribute_docblock:
    decision: ATTR_PRIMARY
    meaning: PHP 8.4 attribute primary; docblock fallback para pre-8.4
    rationale: type-safe + O(1) Reflection + IDE-friendly
  q3_dry_run_default:
    decision: INTERACTIVE_PROMPT
    meaning: $this->confirm(...) con default false; --force skip; --no-interaction safe no-op
    rationale: prompt explícito en el momento de ejecución, CI pasa --force

source_feature:
  location: projects/reto/reto-api/app/Modules/Admin/Console/Commands/DiscoverAbilitiesCommand.php
  loc: 268
  written_against: makroz/director-laravel v1.3.0 (pre-1.4.0)
  status: NO mergeado (rama huérfana makromania/260624-0511--admin-module)
  assumptions_reto_specific:
    - id: AR-001
      assumption: "Path hardcoded a app_path('Modules')"
      action: "Generalizar via config('mk_director.paths.modules', app_path('Modules'))"
    - id: AR-002
      assumption: "Namespace hardcoded a App\\Modules\\..."
      action: "Reflection-based discovery (no asunción de namespace)"
    - id: AR-003
      assumption: "Tabla central 'abilities' (no scope-aware)"
      action: "Scope-aware: {scope}_abilities cuando se opera en módulo, sino tabla central"
    - id: AR-004
      assumption: "Command name mk:discover:abilities (2 puntos)"
      action: "Renombrar a mk:discover-abilities (guión, matches mk:module pattern)"
    - id: AR-005
      assumption: "Auto-genera CRUD abilities (view/create/edit/delete + wildcard) por módulo"
      action: "Opt-in via --with-crud-defaults flag (default false). Default = solo abilities declaradas explícitamente."
    - id: AR-006
      assumption: "PHPDoc @ability tag como única fuente"
      action: "Preferir atributo PHP 8.4 #[\Mk\Director\Auth\Attributes\Ability]. Docblock como fallback para apps pre-8.4."
    - id: AR-007
      assumption: "Ability::query()->where()->first() Eloquent lookup"
      action: "Preferir DB::table('{scope}_abilities')->upsert() (idempotencia nativa, soporta multi-scope en una sola llamada)"

triage_checklist:
  R-G-033-A-1_≥_2_dominios:
    answer: SÍ
    rationale: |
      Cualquier app con RBAC en módulos necesita descubrir abilities declaradas
      explícitamente en providers/controllers. Dos dominios bounded confirmados:
        1. mk-director-laravel nativo (cualquier `--with-rbac` module).
        2. RETO (admin scope con 15 abilities).
      Además: cualquier consumer futuro que use mk:module --with-rbac también
      lo necesita (el MakeModuleCommand YA referencia este comando en su
      output: `mk:discover-abilities --module={$moduleName}`). El
      scaffolder depende del consumer del command.
  R-G-033-A-2_testeable_sin_RETO:
    answer: SÍ
    rationale: |
      El comando opera sobre:
        - Archivos PHP (ReflectionClass, attributes, docblocks) → fixture local.
        - DB tables (UPSERT) → SQLite in-memory via MkLaravelTestCase.
        - Module providers (boot() + discoverAbilities()) → mockeable con
          una subclase del provider.
      No requiere RETO corriendo. Tests Pest usan tempdir + SQLite (patrón
      heredado de R-PKG-008: modulesPath() override + Capsule::addConnection).
  R-G-033-A-3_doc_sin_RETO:
    answer: SÍ
    rationale: |
      Documentable como "auto-descubrir abilities declaradas en módulos
      Laravel" sin mencionar RETO. La skill reference se titula
      `discover-abilities.md` y describe el patrón genérico
      (provider → discoverAbilities() → UPSERT en {scope}_abilities).
      RETO aparece solo como ejemplo en CHANGELOG, no en la skill.
  decision: GO (cumple R-G-033-A, va al paquete)

