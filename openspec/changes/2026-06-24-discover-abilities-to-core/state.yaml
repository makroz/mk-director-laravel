findings:
  closing:
    - id: R-PKG-007
      title: DiscoverAbilitiesCommand debe vivir en el paquete, no en RETO
      track: triage-closed + design-in-flight
      evidence:
        - 268 LOC de RETO resuelven un problema genérico (auto-descubrir abilities).
        - R-PKG-008 ya expone `discoverAbilities()` en provider-rbac.stub (15 abilities).
        - MakeModuleCommand output referencia `mk:discover-abilities` como next-step obligatorio post-scaffold.
    - id: D-001-rpkg007
      title: Source of truth = provider.discoverAbilities(), NO reflection parsing
      rationale: |
        El provider-rbac.stub de R-PKG-008 YA implementa discoverAbilities() retornando
        las 15 abilities explícitas. mk:discover-abilities DEBE consumir este array,
        no re-parsear controllers. Razón: una sola fuente de verdad evita drift entre
        abilities en Gate::define() y filas en {scope}_abilities.
      applies_to: design.md D1, impl T1.1

  explicitly_out_of_scope:
    - id: OOS-RPKG007-001
      title: "Reescribir DiscoverAbilitiesCommand de RETO in-place"
      reason: "RETO retrofit es R-RET-001 (sprint separado, blocked hasta v1.5.0+)."
    - id: OOS-RPKG007-002
      title: "Cambiar el sistema de abilities base"
      reason: "Ya funciona (R3-014 FK hardening cerrado). Solo agregamos discovery."
    - id: OOS-RPKG007-003
      title: "UI integration"
      reason: "El comando es CLI-only. UI de ability management viene de R-PKG-008 (AbilityController).

risk_register:
  - id: R-RISK-PKG-007-001
    description: "El comando de RETO asume estructura app/Modules/{Name}/Http/Controllers/*. Si el paquete usa otro path, hay que generalizar."
    mitigation: "Usar config mk_director.paths.modules o default sensible (app/Modules). Documentar override."
    status: mitigated-by-design (T0.1.b design.md D5 path resolution)
  - id: R-RISK-PKG-007-002
    description: "Multi-scope conflict: ¿cómo detectar si {scope}_abilities existe vs central abilities?"
    mitigation: "Scope-aware: command mira {scope}_abilities primero; si no existe, fallback a tabla central. Loguear cuál se usó."
    status: in-design (T0.1.b design.md D6 scope detection)
  - id: R-RISK-PKG-007-003
    description: "BC para apps pre-1.5.0 que usaban mk:module sin --with-rbac (no tienen provider con discoverAbilities())."
    mitigation: "Si el provider no expone discoverAbilities(), fallback a (1) atributos PHP 8.4 en controllers, (2) docblock @ability. Loguear qué source se usó."
    status: in-design (T0.1.b design.md D7 fallback chain)
  - id: R-RISK-PKG-007-004
    description: "RETO ya tiene tabla 'abilities' central usada por mk:make:auth-user (v1.3.x). El nuevo command podría duplicar filas."
    mitigation: "mk:discover-abilities opera por scope ({scope}_abilities). Tabla central `abilities` solo la toca mk:make:auth-user, NO este command. Documentar scope ownership en DEVELOPER_GUIDE.md."
    status: mitigated-by-design (T0.1.b design.md D6)

